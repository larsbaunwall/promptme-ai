<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptMe AI - Teleprompter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        #app {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .controls {
            background: #1a1a1a;
            padding: 15px;
            border-bottom: 2px solid #333;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label {
            font-size: 14px;
            color: #aaa;
        }

        input[type="range"] {
            width: 120px;
        }

        input[type="number"] {
            width: 70px;
            padding: 5px;
            background: #333;
            border: 1px solid #555;
            color: #fff;
            border-radius: 4px;
        }

        button {
            padding: 8px 16px;
            background: #0066cc;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        button:hover {
            background: #0052a3;
        }

        button.toggle {
            background: #333;
        }

        button.toggle.active {
            background: #0066cc;
        }

        .prompter-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        .prompter-content {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 40px;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.6;
        }

        .emphasis {
            color: #ff4444;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            border: none;
            color: #fff;
            padding: 40px;
            font-family: inherit;
            font-size: inherit;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        .edit-mode {
            display: block;
        }

        .play-mode {
            display: none;
        }

        .playing .edit-mode {
            display: none;
        }

        .playing .play-mode {
            display: block;
        }

        .speed-value {
            min-width: 40px;
            text-align: center;
            color: #fff;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="controls">
            <div class="control-group">
                <button id="playBtn">▶ Play</button>
            </div>

            <div class="control-group">
                <label>Speed:</label>
                <input 
                    type="range" 
                    id="speedSlider"
                    min="1" 
                    max="10" 
                    step="0.5"
                    value="2"
                >
                <span class="speed-value" id="speedValue">2</span>
            </div>

            <div class="control-group">
                <label>Font Size:</label>
                <input 
                    type="number" 
                    id="fontSizeInput"
                    min="16" 
                    max="120" 
                    step="2"
                    value="32"
                >
                <span style="color: #aaa;">px</span>
            </div>

            <div class="control-group">
                <button id="mirrorVerticalBtn" class="toggle">
                    ↕ Vertical Mirror
                </button>
            </div>

            <div class="control-group">
                <button id="mirrorHorizontalBtn" class="toggle">
                    ↔ Horizontal Mirror
                </button>
            </div>
        </div>

        <div class="prompter-container" id="prompterContainer">
            <textarea 
                class="edit-mode"
                id="textEditor"
                placeholder="Enter your text here... Use [square brackets] for emphasis (will appear in red)"
            >Welcome to PromptMe AI!

This is your teleprompter.

You can:
• Type or paste your script
• Use [square brackets] for emphasis
• Adjust font size
• Control scroll speed
• Mirror vertically or horizontally

Press Play to start!</textarea>

            <div 
                class="play-mode prompter-content"
                id="prompterContent"
            ></div>
        </div>
    </div>

    <script>
        // State
        let text = '';
        let fontSize = 32;
        let speed = 2;
        let isPlaying = false;
        let scrollPosition = 0;
        let mirrorVertical = false;
        let mirrorHorizontal = false;
        let animationFrame = null;
        let lastTime = null;

        // DOM elements
        const playBtn = document.getElementById('playBtn');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');
        const fontSizeInput = document.getElementById('fontSizeInput');
        const mirrorVerticalBtn = document.getElementById('mirrorVerticalBtn');
        const mirrorHorizontalBtn = document.getElementById('mirrorHorizontalBtn');
        const prompterContainer = document.getElementById('prompterContainer');
        const textEditor = document.getElementById('textEditor');
        const prompterContent = document.getElementById('prompterContent');

        // Format text with emphasis
        function formatText(text) {
            return text.replace(/\[([^\]]+)\]/g, '<span class="emphasis">$1</span>');
        }

        // Update transform based on mirror settings
        function updateTransform() {
            let transform = `translateY(${scrollPosition}px)`;
            
            if (mirrorVertical && mirrorHorizontal) {
                transform = `scale(-1, -1) ${transform}`;
            } else if (mirrorVertical) {
                transform = `scaleY(-1) ${transform}`;
            } else if (mirrorHorizontal) {
                transform = `scaleX(-1) ${transform}`;
            }
            
            prompterContent.style.transform = transform;
        }

        // Animation loop
        function animate(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const delta = timestamp - lastTime;
            lastTime = timestamp;

            scrollPosition -= (speed * delta) / 16.67;
            updateTransform();

            animationFrame = requestAnimationFrame(animate);
        }

        // Toggle play/pause
        function togglePlay() {
            isPlaying = !isPlaying;

            if (isPlaying) {
                scrollPosition = 0;
                lastTime = null;
                text = textEditor.value;
                prompterContent.innerHTML = formatText(text);
                prompterContent.style.fontSize = fontSize + 'px';
                prompterContainer.classList.add('playing');
                playBtn.textContent = '⏸ Pause';
                updateTransform();
                animationFrame = requestAnimationFrame(animate);
            } else {
                prompterContainer.classList.remove('playing');
                playBtn.textContent = '▶ Play';
                if (animationFrame) {
                    cancelAnimationFrame(animationFrame);
                    animationFrame = null;
                }
            }
        }

        // Event listeners
        playBtn.addEventListener('click', togglePlay);

        speedSlider.addEventListener('input', (e) => {
            speed = parseFloat(e.target.value);
            speedValue.textContent = speed;
        });

        fontSizeInput.addEventListener('input', (e) => {
            fontSize = parseInt(e.target.value);
            textEditor.style.fontSize = fontSize + 'px';
            if (isPlaying) {
                prompterContent.style.fontSize = fontSize + 'px';
            }
        });

        mirrorVerticalBtn.addEventListener('click', () => {
            mirrorVertical = !mirrorVertical;
            mirrorVerticalBtn.classList.toggle('active');
            updateTransform();
        });

        mirrorHorizontalBtn.addEventListener('click', () => {
            mirrorHorizontal = !mirrorHorizontal;
            mirrorHorizontalBtn.classList.toggle('active');
            updateTransform();
        });

        // Initialize
        textEditor.style.fontSize = fontSize + 'px';
    </script>
</body>
</html>
